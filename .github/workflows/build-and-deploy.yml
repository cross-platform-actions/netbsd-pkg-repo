name: Build and Deploy Packages

on:
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      mock_build:
        description: "Skip the VM build; generate fake packages to test the deploy path"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-matrix:
    name: Generate build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate matrix
        id: matrix
        run: |
          matrix=$(sh scripts/generate-matrix.sh)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }} (NetBSD ${{ matrix.version }})
    needs: generate-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Shortcut for iterating on the deploy path: dispatch with
      # mock_build=true to generate a handful of empty .tgz files plus a
      # summary index, so the rest of the pipeline runs without waiting
      # hours for the VM build.
      - name: Mock build -- generate fake packages
        if: ${{ inputs.mock_build }}
        run: |
          mkdir -p packages/All
          for p in bash-5.2.37 sudo-1.9.16 curl-8.12.0 rsync-3.4.1; do
              : > "packages/All/${p}.tgz"
          done
          : | gzip -9 > packages/All/pkg_summary.gz

      # Restore previously-built packages. A unique key per run means save
      # always succeeds; the restore-keys prefix falls back to the most
      # recent cache for this target. Progressive runs converge to a full
      # build under the 6-hour job limit.
      - name: Restore packages cache
        if: ${{ !inputs.mock_build }}
        uses: actions/cache/restore@v4
        with:
          path: packages
          key: packages-${{ matrix.build_name }}-${{ github.run_id }}
          restore-keys: |
            packages-${{ matrix.build_name }}-

      # Boot the NetBSD/vax VM and leave it running for the build step. The
      # action owns all the SIMH/image/boot machinery. sync_files must be
      # false (the image has no rsync; the action rejects it otherwise), and
      # shutdown_vm must be false so the VM — and the ssh config +
      # SSH_ASKPASS the action sets up — survive into the next step.
      #
      # Pinned to the worktree-vax branch during bootstrap; move to a tagged
      # release once NetBSD/vax support is released.
      - name: Start VM
        if: ${{ !inputs.mock_build }}
        uses: cross-platform-actions/action@worktree-vax
        with:
          operating_system: netbsd
          architecture: ${{ matrix.arch }}
          version: ${{ matrix.version }}
          # 512 MB is the MicroVAX 3900 maximum — 8x netbsd-builder's own
          # 64 MB build cap, which is what makes the openssl/perl closure
          # feasible.
          memory: 512M
          sync_files: false
          shutdown_vm: false
          run: 'true'

      - name: Build packages
        if: ${{ !inputs.mock_build }}
        # perl (a transitive build dep of nearly everything) needs most of the
        # 6-hour job to finish in one run, so push this near the ceiling: the
        # Start VM step boots in a few minutes, leaving cache save + artifact
        # steps ~15 min after this cap. build-packages.sh wraps the in-guest
        # build in a 330-min timeout so packages are always collected first.
        timeout-minutes: 345
        run: sh scripts/build-packages.sh

      # Always save, even on timeout or failure, so partial progress is
      # preserved. Skipped for mock builds so they don't pollute the cache.
      - name: Save packages cache
        if: ${{ always() && !inputs.mock_build }}
        uses: actions/cache/save@v5
        with:
          path: packages
          key: packages-${{ matrix.build_name }}-${{ github.run_id }}

      - name: Prepare site tarball
        run: |
          abi_dir="${{ matrix.abi_dir }}"
          mkdir -p "_site/$abi_dir"
          cp -R packages/. "_site/$abi_dir/"
          tar -C _site -czf site.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-${{ matrix.build_name }}
          path: site.tar.gz

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: site-*

      - name: Extract tarballs into _site
        run: sh scripts/deploy/extract-artifacts.sh

      - name: Generate landing page
        env:
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: sh scripts/deploy/generate-landing-page.sh

      - name: Generate directory indexes
        run: sh scripts/deploy/generate-directory-indexes.sh

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
