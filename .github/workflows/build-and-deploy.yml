name: Build and Release Packages

# Entry points:
#   * pushing a version tag (v*) builds AND creates DRAFT releases for review;
#   * pushing any branch builds only, to validate the change (no release);
#   * publishing a release deploys the Pages landing page.
# workflow_dispatch builds + drafts too, for testing (see mock_build).
on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mock_build:
        description: "Skip the VM build; generate fake packages to test the release/deploy path"
        type: boolean
        default: false

# Least privilege by default; individual jobs elevate what they need.
permissions:
  contents: read

# NetBSD src branch used to build the cross toolchain. The toolchain cache is
# keyed on this, so bumping it triggers a fresh (uncached) toolchain build.
env:
  SRC_BRANCH: netbsd-10

jobs:
  build:
    name: Cross-build ${{ matrix.arch }} (NetBSD ${{ matrix.version }})
    # Runs on tag pushes, branch pushes (validation only) and manual dispatch.
    # The `release: published` event only deploys (below); it must not rebuild.
    if: ${{ github.event_name != 'release' }}
    runs-on: ubuntu-latest
    # A cache-hit run reaches packages in ~20 min; a cache-miss run rebuilds the
    # full build.sh toolchain (~90 min) + tool closure, so ~2 h worst case. 180
    # gives margin while capping a hung cross-platform-actions VM boot (which
    # otherwise retries SSH until the limit) instead of squatting a runner for 5 h.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      # One entry per NetBSD target with no official prebuilt pkgsrc binaries.
      # abi_dir matches netbsd-builder image naming; it names the artifact and
      # the release tag prefix (<abi_dir>--<version>). build_name is a short
      # cache-key/log slug. To add a target, add a row here.
      matrix:
        include:
          - arch: vax
            version: "10.1"
            abi_dir: NetBSD-10.1-vax
            build_name: vax-101
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Shortcut for iterating on the release/deploy path: dispatch with
      # mock_build=true to generate a handful of empty .tgz files plus a
      # summary index, so the rest of the pipeline runs without a VM build.
      - name: Mock build -- generate fake packages
        if: ${{ inputs.mock_build }}
        run: |
          mkdir -p packages/All
          for p in bash-5.2.37 sudo-1.9.16 rsync-3.4.1; do
              : > "packages/All/${p}.tgz"
          done
          : | gzip -9 > packages/All/pkg_summary.gz

      # Read the pinned pkgsrc branch so it can be passed into the guest.
      - name: Read pkgsrc branch
        if: ${{ !inputs.mock_build }}
        id: cfg
        run: |
          branch=$(grep -v '^[[:space:]]*#' config/pkgsrc_branch \
              | grep -v '^[[:space:]]*$' | head -n1)
          echo "pkgsrc_branch=$branch" >> "$GITHUB_OUTPUT"

      # Restore the cached vax cross toolchain (a single tarball under the
      # workspace). A unique key per run means save always succeeds; the
      # restore-keys prefix falls back to the newest cache for this
      # arch+version+src-branch, so later runs reuse the ~90-min toolchain and
      # finish in minutes. The guest extracts the tarball and skips build.sh
      # when it is present.
      - name: Restore toolchain cache
        if: ${{ !inputs.mock_build }}
        uses: actions/cache/restore@v4
        with:
          path: toolchain-cache
          key: toolchain-${{ matrix.build_name }}-${{ env.SRC_BRANCH }}-v2-${{ github.run_id }}
          restore-keys: |
            toolchain-${{ matrix.build_name }}-${{ env.SRC_BRANCH }}-v2-

      # Second cache layer: the native host build-tool closure (perl, bison,
      # texinfo, libtool-base, gettext-*, ...) that pkgsrc installs into /usr/pkg
      # to run the cross build. Rebuilding it costs ~16 min every run; the guest
      # snapshots the installed state to this tarball and restores it next time.
      # Keyed on the pinned pkgsrc branch (tool versions change with it) plus a
      # version suffix to rotate the cache; unique per run so save always writes,
      # with the restore-keys prefix reusing the newest snapshot.
      - name: Restore tool-closure cache
        if: ${{ !inputs.mock_build }}
        uses: actions/cache/restore@v4
        with:
          path: toolpkg-cache
          key: toolpkg-${{ matrix.build_name }}-${{ steps.cfg.outputs.pkgsrc_branch }}-v1-${{ github.run_id }}
          restore-keys: |
            toolpkg-${{ matrix.build_name }}-${{ steps.cfg.outputs.pkgsrc_branch }}-v1-

      - name: Cross-build packages on NetBSD/amd64
        if: ${{ !inputs.mock_build }}
        uses: cross-platform-actions/action@v1.3.0
        env:
          PKGSRC_BRANCH: ${{ steps.cfg.outputs.pkgsrc_branch }}
          SRC_BRANCH: ${{ env.SRC_BRANCH }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_VERSION: ${{ matrix.version }}
        with:
          operating_system: netbsd
          architecture: x86-64
          version: "10.1"
          memory: 12G
          cpu_count: 4
          # Bidirectional workspace sync (default) carries the toolchain
          # tarball in and the built packages out.
          environment_variables: >-
            PKGSRC_BRANCH SRC_BRANCH TARGET_ARCH TARGET_VERSION
          # Runs as the unprivileged `runner` user (passwordless sudo). The
          # working dir maps to GITHUB_WORKSPACE; the PKGSRC_BRANCH/SRC_BRANCH/
          # TARGET_* vars are forwarded via environment_variables above.
          run: |
            set -eux
            WORKSPACE="$PWD" sh scripts/cross-build.sh

      # Always save, even on failure, so a freshly built toolchain is cached
      # for the next run regardless of whether every package built.
      - name: Save toolchain cache
        if: ${{ always() && !inputs.mock_build }}
        uses: actions/cache/save@v5
        with:
          path: toolchain-cache
          key: toolchain-${{ matrix.build_name }}-${{ env.SRC_BRANCH }}-v2-${{ github.run_id }}

      # Save the host tool-closure snapshot the guest wrote (on a miss) or
      # restored (on a hit); either way it's re-cached under this run's key so
      # the restore-keys prefix keeps finding the newest one.
      - name: Save tool-closure cache
        if: ${{ always() && !inputs.mock_build }}
        uses: actions/cache/save@v5
        with:
          path: toolpkg-cache
          key: toolpkg-${{ matrix.build_name }}-${{ steps.cfg.outputs.pkgsrc_branch }}-v1-${{ github.run_id }}

      # The flat package set (every .tgz plus the generated pkg_summary.gz) is
      # exactly what a release carries as assets and what pkgsrc's PKG_PATH
      # fetches. Uploaded on every branch so a change is reviewable from a
      # green run; only master turns it into an immutable release below.
      # Keyed on abi_dir (not build_name) so the release job can derive each
      # target's ABI straight from the artifact name -- no second matrix to keep
      # in sync with this one.
      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.abi_dir }}
          path: packages/All

  # Turn each target's packages into a DRAFT GitHub release (one per target,
  # tagged <abi>--<version> from the pushed tag). Drafts are mutable and hidden
  # from consumers; a maintainer reviews then publishes them. Publishing is what
  # makes a release immutable -- assets locked, tag protected, signed attestation
  # generated (requires the repo/org "Immutable releases" setting, see readme
  # "Setup") -- and fires the deploy job below via the `release: published`
  # event. The releases are the artifact store consumers pin PKG_PATH to; Pages
  # is only an index.
  release:
    name: Draft releases
    needs: build
    # Only version-tag pushes and manual dispatch cut releases; a plain branch
    # push builds (above) to validate the change but stops short of a release.
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the draft release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Each build target uploaded one `packages-<abi_dir>` artifact; download
      # them all into per-artifact subdirectories.
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: packages-*

      # One draft release per target. The ABI comes from the artifact directory
      # name (packages-<abi_dir>), so this loop needs no matrix. VERSION is the
      # pushed tag (github.ref_name on a tag push); a manual dispatch has no tag,
      # so fall back to a run-scoped prerelease version for test drafts.
      - name: Create draft releases
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -eu
          if [ "${GITHUB_REF_TYPE:-}" = tag ]; then
              VERSION="$GITHUB_REF_NAME"
          else
              VERSION="v0.0.0-dispatch.${GITHUB_RUN_NUMBER}"
          fi
          export VERSION
          for d in artifacts/packages-*; do
              [ -d "$d" ] || continue
              ABI_DIR="${d#artifacts/packages-}" \
                  sh scripts/deploy/create-release.sh "$d"
          done

  # Landing page only -- no packages are served from Pages. It lists each
  # target's newest published release with a copy-paste PKG_PATH and
  # verification steps. Triggered by publishing a release (not the tag push), so
  # it has no `needs`: it runs standalone on the `release: published` event and
  # regenerates the page from whatever published releases now exist.
  deploy:
    name: Deploy landing page to GitHub Pages
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    # Only the Pages deploy needs serializing; builds/releases may overlap.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read    # gh release list
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate landing page
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: sh scripts/deploy/generate-landing-page.sh

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
