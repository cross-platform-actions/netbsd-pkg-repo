name: Build and Deploy Packages

on:
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      mock_build:
        description: "Skip the VM build; generate fake packages to test the deploy path"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# NetBSD src branch used to build the cross toolchain. The toolchain cache is
# keyed on this, so bumping it triggers a fresh (uncached) toolchain build.
env:
  SRC_BRANCH: netbsd-10

jobs:
  build:
    name: Cross-build ${{ matrix.arch }} (NetBSD ${{ matrix.version }})
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      # One entry per NetBSD target with no official prebuilt pkgsrc binaries.
      # abi_dir matches netbsd-builder image naming (the published per-target
      # subtree / consumer PKG_PATH); build_name is a short cache-key/log slug.
      # To add a target, add a row here.
      matrix:
        include:
          - arch: vax
            version: "10.1"
            abi_dir: NetBSD-10.1-vax
            build_name: vax-101
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Shortcut for iterating on the deploy path: dispatch with
      # mock_build=true to generate a handful of empty .tgz files plus a
      # summary index, so the rest of the pipeline runs without a VM build.
      - name: Mock build -- generate fake packages
        if: ${{ inputs.mock_build }}
        run: |
          mkdir -p packages/All
          for p in bash-5.2.37 sudo-1.9.16 rsync-3.4.1; do
              : > "packages/All/${p}.tgz"
          done
          : | gzip -9 > packages/All/pkg_summary.gz

      # Read the pinned pkgsrc branch so it can be passed into the guest.
      - name: Read pkgsrc branch
        if: ${{ !inputs.mock_build }}
        id: cfg
        run: |
          branch=$(grep -v '^[[:space:]]*#' config/pkgsrc_branch \
              | grep -v '^[[:space:]]*$' | head -n1)
          echo "pkgsrc_branch=$branch" >> "$GITHUB_OUTPUT"

      # Restore the cached vax cross toolchain (a single tarball under the
      # workspace). A unique key per run means save always succeeds; the
      # restore-keys prefix falls back to the newest cache for this
      # arch+version+src-branch, so later runs reuse the ~90-min toolchain and
      # finish in minutes. The guest extracts the tarball and skips build.sh
      # when it is present.
      - name: Restore toolchain cache
        if: ${{ !inputs.mock_build }}
        uses: actions/cache/restore@v4
        with:
          path: toolchain-cache
          key: toolchain-${{ matrix.build_name }}-${{ env.SRC_BRANCH }}-v2-${{ github.run_id }}
          restore-keys: |
            toolchain-${{ matrix.build_name }}-${{ env.SRC_BRANCH }}-v2-

      - name: Cross-build packages on NetBSD/amd64
        if: ${{ !inputs.mock_build }}
        uses: cross-platform-actions/action@v1.3.0
        env:
          PKGSRC_BRANCH: ${{ steps.cfg.outputs.pkgsrc_branch }}
          SRC_BRANCH: ${{ env.SRC_BRANCH }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_VERSION: ${{ matrix.version }}
        with:
          operating_system: netbsd
          architecture: x86-64
          version: "10.1"
          memory: 12G
          cpu_count: 4
          # Bidirectional workspace sync (default) carries the toolchain
          # tarball in and the built packages out.
          environment_variables: >-
            PKGSRC_BRANCH SRC_BRANCH TARGET_ARCH TARGET_VERSION
          # Runs as the unprivileged `runner` user (passwordless sudo). The
          # working dir maps to GITHUB_WORKSPACE; the PKGSRC_BRANCH/SRC_BRANCH/
          # TARGET_* vars are forwarded via environment_variables above.
          run: |
            set -eux
            WORKSPACE="$PWD" sh scripts/cross-build.sh

      # Always save, even on failure, so a freshly built toolchain is cached
      # for the next run regardless of whether every package built.
      - name: Save toolchain cache
        if: ${{ always() && !inputs.mock_build }}
        uses: actions/cache/save@v5
        with:
          path: toolchain-cache
          key: toolchain-${{ matrix.build_name }}-${{ env.SRC_BRANCH }}-v2-${{ github.run_id }}

      - name: Prepare site tarball
        run: |
          abi_dir="${{ matrix.abi_dir }}"
          mkdir -p "_site/$abi_dir"
          cp -R packages/. "_site/$abi_dir/"
          tar -C _site -czf site.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-${{ matrix.build_name }}
          path: site.tar.gz

  # Deploy only from master. Branch pushes still build and upload artifacts
  # (so a change can be reviewed from a green run) but must not publish to the
  # live Pages site.
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: site-*

      - name: Extract tarballs into _site
        run: sh scripts/deploy/extract-artifacts.sh

      - name: Generate landing page
        env:
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: sh scripts/deploy/generate-landing-page.sh

      - name: Generate directory indexes
        run: sh scripts/deploy/generate-directory-indexes.sh

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
